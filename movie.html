<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFlix - Movie Details</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div id="movie" class="movie-detail-wrapper"></div>
        
        <section class="recommendations-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-thumbs-up" style="color: #E50914;"></i>
                    You Might Also Like
                </h2>
                <div class="section-line"></div>
            </div>
            <div id="recommendations" class="movies-grid"></div>
        </section>
    </main>

    <footer class="oled-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-triangle">▶</span>
                <span>FreeFlix</span>
            </div>
            <p class="footer-text">© 2024 FreeFlix. Watch anywhere, anytime on perfect OLED black.</p>
            <div class="footer-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
